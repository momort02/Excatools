name: Excalia-Scanner
on:
  schedule:
    - cron: '*/10 * * * *' # S'exécute toutes les 10 minutes
  workflow_dispatch:      # Permet de cliquer sur "Run" manuellement
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install node-fetch@2 firebase-admin
      - name: Run
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node worker.js
