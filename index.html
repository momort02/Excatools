<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExcaTools - Companion Excalia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="excatools.css">
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-title">EXCATOOLS</div>
        <div class="logo-sub">Companion Excalia.fr</div>
    </div>
    <nav class="nav">
        <button class="nav-btn active" id="navMarket" onclick="showPage('market')">⚔ Marché</button>
        <button class="nav-btn" id="navPrices" onclick="showPage('prices')">📈 Prix</button>
        <button class="nav-btn" id="navAlerts" onclick="showPage('alerts')">🔔 Alertes</button>
    </nav>
</header>

<main>
    <div id="marketPage">
        <div class="stats-bar">
            <div>Items actifs: <span id="statActive">0</span></div>
            <input type="text" id="searchInput" placeholder="Rechercher un objet..." oninput="window.handleSearch(this.value)">
        </div>
        <div id="catsBar" class="cats-bar"></div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="pricesPage" class="hidden">
        <div class="section-title">Historique des Prix</div>
        <div id="pricesList" class="prices-grid"></div>
    </div>

    <div id="alertsPage" class="hidden">
        <div class="alert-form">
            <input type="text" id="alertItemInput" placeholder="Nom de l'item (ex: Netherite)">
            <input type="number" id="alertPrice" placeholder="Prix max">
            <input type="text" id="alertWebhook" placeholder="URL Webhook Discord">
            <button onclick="window.createAlert()">Créer l'alerte</button>
        </div>
        <div id="alertsList"></div>
    </div>
</main>

<div id="chartModal" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="window.closeModal()">×</button>
        <h2 id="modalTitle">---</h2>
        <canvas id="priceChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="excatools.js"></script>
</body>
</html>
